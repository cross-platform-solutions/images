name: github-actions-buildkit-job

on:
  push:
    branches:
      - main
    paths:
      - 'github-actions-buildkit-job/**'
  pull_request:
    paths:
      - 'github-actions-buildkit-job/**'

env:
  IMAGE_NAME: github-actions-buildkit-job

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.IMAGE_NAME }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/cross-platform-solutions/${{ env.IMAGE_NAME }}:latest
            ghcr.io/cross-platform-solutions/${{ env.IMAGE_NAME }}:${{ github.sha }}
